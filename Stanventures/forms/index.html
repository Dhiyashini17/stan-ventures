<!DOCTYPE html>
<html lang="en">
<head>
    <title>admission form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Admission Form</h1>
        <form>
            <label for="name">Full Name:</label>
            <input type="text"   required></br></br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required></br></br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required></br></br>
            <label for="father_name">Father's Name:</label>
            <input type="text" id="father_name" name="father_name" required></br></br>
            <label for="mother_name">Mother's Name:</label>         
            <input type="text" id="mother_name" name="mother_name" required></br></br>
            <label for="guardian_name">Guardian's Name:</label>
            <input type="text" id="guardian_name" name="guardian_name" required></br></br>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required></br></br>
            <label for="gender">Gender:</label>         
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select></br></br> 
            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" required></textarea></br></br>
            <label for="education">Educational Background:</label>
            <textarea id="education" name="education" rows="4" required></textarea></br></br>   
            <label for="sslc_marks">SSLC Marks:</label>
            <input type="number" id="sslc_marks" name="sslc_marks" min="0" max="500" required></br></br>
            <label for="hslc_marks">HSLC Marks:</label>
            <input type="number" id="hslc_marks" name="hslc_marks" min="0" max="600" required></br></br>
            <label for="course">Course Applying For:</label>
            <select id="course" name="course" required>
                <option value="">Select a course</option>
                <option value="computer_science">Computer Science</option>
                <option value="business_administration">Business Administration</option>
                <option value="psychology">Psychology</option>
                <option value="engineering">Engineering</option>
            </select>
            </br></br>

            <button type="submit">Submit</button>
        </form>

</body>
</html>
